<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter Web App</title>
    <!-- Importing modern font for premium aesthetics -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Currency Converter</h1>
        <p>Student project merging Promises, Fetch API, and Closures</p>
        
        <!-- --- MAIN CURRENCY CONVERTER FEATURE --- -->
        <div class="converter-box">
            <!-- Using input logic derived from name input example -->
            <input type="number" id="amount" placeholder="Enter Amount" value="1">
            
            <div class="dropdowns">
                <select id="fromCurrency">
                    <option value="USD" selected>USD - US Dollar</option>
                    <option value="INR">INR - Indian Rupee</option>
                    <option value="EUR">EUR - Euro</option>
                    <option value="GBP">GBP - British Pound</option>
                    <option value="JPY">JPY - Japanese Yen</option>
                    <option value="AUD">AUD - Australian Dollar</option>
                    <option value="CAD">CAD - Canadian Dollar</option>
                    <option value="CHF">CHF - Swiss Franc</option>
                    <option value="CNY">CNY - Chinese Yuan</option>
                    <option value="SGD">SGD - Singapore Dollar</option>
                    <option value="AED">AED - UAE Dirham</option>
                    <option value="NZD">NZD - New Zealand Dollar</option>
                    <option value="HKD">HKD - Hong Kong Dollar</option>
                    <option value="KRW">KRW - South Korean Won</option>
                    <option value="ZAR">ZAR - South African Rand</option>
                </select>
                <span>to</span>
                <select id="toCurrency">
                    <option value="USD">USD - US Dollar</option>
                    <option value="INR" selected>INR - Indian Rupee</option>
                    <option value="EUR">EUR - Euro</option>
                    <option value="GBP">GBP - British Pound</option>
                    <option value="JPY">JPY - Japanese Yen</option>
                    <option value="AUD">AUD - Australian Dollar</option>
                    <option value="CAD">CAD - Canadian Dollar</option>
                    <option value="CHF">CHF - Swiss Franc</option>
                    <option value="CNY">CNY - Chinese Yuan</option>
                    <option value="SGD">SGD - Singapore Dollar</option>
                    <option value="AED">AED - UAE Dirham</option>
                    <option value="NZD">NZD - New Zealand Dollar</option>
                    <option value="HKD">HKD - Hong Kong Dollar</option>
                    <option value="KRW">KRW - South Korean Won</option>
                    <option value="ZAR">ZAR - South African Rand</option>
                </select>
            </div>
            
            <!-- Button and Output reusing original IDs -->
            <button id="load-btn">Convert</button>
            <p id="status">Ready to convert</p>
            
            <!-- Closure counter output -->
            <p id="count">Total conversions: 0</p>
        </div>

        <hr />

        <!-- --- EXTRA FEATURE: GST CALCULATOR --- -->
        <div class="gst-box">
            <h3>Extra: GST Calculator</h3>
            <input type="number" id="price" placeholder="Enter the price">
            <button id="btn">Calculate GST</button>
            <p id="result">Awaiting price input...</p>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
